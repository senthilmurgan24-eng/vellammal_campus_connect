# Nginx virtual host for ranknovainstitute.com
# Place this file in /etc/nginx/conf.d/ranknovainstitute.conf on your EC2 host.

upstream campus_backend {
    # Backend app target. Use private IP or localhost when backend runs on same host.
    server 127.0.0.1:8081;
    keepalive 64;
}

server {
    listen 80;
    server_name ranknovainstitute.com www.ranknovainstitute.com;

    # If SSL is terminated at ALB, keep HTTP between ALB and Nginx.
    # If you terminate SSL at Nginx directly, add listen 443 ssl and cert paths.

    root /var/www/ranknovainstitute/current;
    index index.html;

    # Upload-friendly limits for current/future file upload features
    client_max_body_size 30m;
    client_body_timeout 60s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend static assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # API reverse proxy to Spring Boot
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://campus_backend;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # WebSocket endpoint
    location /ws-connect {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://campus_backend;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback today and future route expansion
    # For future multi-page split, add explicit location blocks before this fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
