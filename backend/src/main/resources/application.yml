server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css

spring:
  application:
    name: campus-connect
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:30MB}
  
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://ranknova-db.cpgiaoygqj8z.ap-southeast-2.rds.amazonaws.com:5432/ranknova}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Ranknova} 

  
  # JPA/Hibernate Configuration
  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # Email Configuration
  mail:
    host: smtp.hostinger.com
    port: 465
    username: ${EMAIL_USERNAME:academics@ranknovainstitute.com}
    password: ${EMAIL_APP_PASSWORD:your-16-char-app-password}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: true
          starttls:
            enable: false
            required: false
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false
  main:
    banner-mode: off
  security:
    filter:
      dispatcher-types: ASYNC,ERROR,REQUEST

app:
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
  email:
    from: ${EMAIL_FROM:${EMAIL_USERNAME:academics@ranknovainstitute.com}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://ranknovainstitute.com,https://www.ranknovainstitute.com}
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://ranknovainstitute.com,https://www.ranknovainstitute.com}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
